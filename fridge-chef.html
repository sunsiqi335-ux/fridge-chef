<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冰箱小厨 · 食材菜谱推荐</title>
  <style>
    :root{--ink:#20362f;--muted:#6a7972;--paper:#fffdf8;--cream:#f4f0e7;--green:#1f7453;--soft:#dcefe5;--line:#d9ddd5;--orange:#ec9a4a}
    *{box-sizing:border-box} body{margin:0;background:var(--cream);color:var(--ink);font-family:"Microsoft YaHei",system-ui,sans-serif} button,input{font:inherit}
    .app{max-width:1180px;margin:auto;padding:30px 22px 56px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.brand{font-size:23px;font-weight:800;letter-spacing:.5px}.brand span{color:var(--green)}.day{color:var(--muted);font-size:14px}
    .hero{background:linear-gradient(120deg,#225b46,#397c5c);color:white;border-radius:28px;padding:34px 38px;margin-bottom:26px;display:flex;align-items:center;justify-content:space-between;overflow:hidden}.hero h1{font-size:34px;margin:0 0 12px}.hero p{margin:0;opacity:.88}.hero-art{font-size:96px;transform:rotate(-8deg);filter:drop-shadow(12px 10px 0 rgba(0,0,0,.11))}
    .section-menu{display:none}.grid{display:grid;grid-template-columns:360px 1fr;gap:26px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:24px}.panel h2{font-size:18px;margin:0 0 7px}.hint{font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.6}
    .upload{display:block;border:2px dashed #a7c5b5;border-radius:16px;background:#f7fcf8;padding:21px 12px;text-align:center;cursor:pointer;transition:.2s}.upload:hover{background:var(--soft)}.upload input{display:none}.upload strong{display:block;margin:8px 0 4px}.upload small{color:var(--muted)}.preview{display:none;width:100%;max-height:150px;object-fit:cover;border-radius:12px;margin-top:12px}.scan-result{display:none;margin-top:10px;padding:10px 12px;border-radius:10px;background:#edf7f0;color:var(--green);font-size:13px;line-height:1.5}.ai-candidates{display:none;margin-top:10px;padding:12px;border:1px solid #cfe3d7;border-radius:10px;background:#f8fcf9}.ai-candidates p{margin:0 0 8px;color:var(--green);font-size:13px;font-weight:700}.candidate-list{display:flex;flex-wrap:wrap;gap:7px}.candidate{display:flex;gap:5px;align-items:center;padding:6px 8px;border:1px solid var(--line);border-radius:100px;background:#fff;font-size:13px}.candidate input{width:14px;height:14px}.candidate-actions{display:flex;gap:8px;margin-top:10px}.candidate-actions .btn{font-size:13px;padding:8px 10px}
    .row{display:flex;gap:8px;margin:18px 0 12px}.row input{min-width:0;flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:white}.btn{border:0;border-radius:10px;padding:10px 14px;background:var(--green);color:white;font-weight:700;cursor:pointer}.btn:hover{filter:brightness(.93)}.btn.alt{background:#edf4ef;color:var(--green)}
    .expiry-alert{display:none;margin:14px 0 0;padding:10px 12px;border-radius:10px;background:#fff1df;color:#9a581a;font-size:13px;line-height:1.5}.ingredients{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;min-height:42px}.ingredient{display:flex;gap:9px;align-items:center;text-align:left;border:1px solid var(--line);border-radius:13px;padding:8px;background:#fff}.ingredient.urgent{border-color:#efbd85;background:#fffaf3}.ingredient-photo{display:grid;place-items:center;width:42px;height:42px;flex:0 0 42px;border-radius:10px;background:var(--soft);font-size:25px;overflow:hidden}.ingredient-photo img{width:100%;height:100%;object-fit:cover}.ingredient-info{min-width:0;flex:1}.ingredient-name{display:block;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ingredient-days{display:block;margin-top:3px;color:var(--muted);font-size:12px;white-space:nowrap}.ingredient-days b{color:var(--green)}.ingredient.urgent .ingredient-days b{color:#b26018}.ingredient-actions{display:flex;flex-direction:column;gap:2px}.ingredient-action{border:0;background:transparent;color:var(--muted);padding:2px;cursor:pointer;font-size:12px}.ingredient-action:hover{color:var(--green)}.subhead{margin:22px 0 10px;font-size:14px;font-weight:700}.category{display:flex;gap:7px;flex-wrap:wrap}.category button{border:1px solid var(--line);background:white;border-radius:100px;padding:7px 10px;color:var(--muted);cursor:pointer}.category button:hover{border-color:var(--green);color:var(--green)}
    .result-head{display:flex;align-items:end;justify-content:space-between;margin-bottom:14px}.result-head h2{margin:0}.count{color:var(--green);font-size:14px;font-weight:700}.recipe-filters{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 14px}.recipe-filters button{border:1px solid var(--line);border-radius:100px;padding:7px 10px;background:#fff;color:var(--muted);cursor:pointer;font-size:13px}.recipe-filters button.active{background:var(--green);border-color:var(--green);color:#fff}.recipes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.recipe{border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;background:#fff;transition:.18s}.recipe:hover,.recipe.active{border-color:var(--green);box-shadow:0 7px 20px rgba(31,116,83,.11)}.recipe-top{display:flex;justify-content:space-between;align-items:center}.emoji{font-size:35px}.tag{font-size:12px;padding:4px 8px;border-radius:100px;background:#fff1df;color:#a75c17}.recipe h3{margin:13px 0 6px;font-size:17px}.recipe p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.bar{height:6px;background:#edf0ed;border-radius:6px;margin:13px 0 7px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green);border-radius:6px}.match{font-size:12px;color:var(--green);font-weight:700}.recipe-labels{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}.recipe-label{font-size:11px;padding:3px 7px;border-radius:100px;background:#edf4ef;color:var(--green)}
    .detail{display:none;margin-top:18px;border-top:1px solid var(--line);padding-top:18px}.detail.show{display:block}.detail h3{margin:0 0 9px}.detail ul{padding-left:18px;margin:8px 0;color:var(--muted);font-size:14px;line-height:1.8}.detail strong{color:var(--ink)}.missing{color:#b26018}.edit-dialog{border:0;border-radius:18px;padding:0;width:min(400px,calc(100% - 32px));color:var(--ink);box-shadow:0 14px 40px rgba(27,53,39,.22)}.edit-dialog::backdrop{background:rgba(27,53,39,.38)}.edit-form{padding:20px}.edit-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.edit-title h3{margin:0}.dialog-close{border:0;background:transparent;color:var(--muted);font-size:24px;cursor:pointer}.edit-field{display:block;margin:14px 0;color:var(--muted);font-size:13px}.edit-field input{display:block;width:100%;margin-top:6px;border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--ink);font-size:16px}.edit-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}.start{padding:46px 10px;text-align:center;color:var(--muted)}
    .image-dialog{border:0;border-radius:18px;padding:12px;width:min(560px,calc(100% - 28px));background:var(--paper)}.image-dialog::backdrop{background:rgba(27,53,39,.6)}.image-dialog img{display:block;width:100%;max-height:70vh;object-fit:contain;border-radius:12px}.image-dialog button{display:block;margin:8px 0 0 auto;border:0;background:var(--green);border-radius:9px;padding:8px 12px;color:#fff;cursor:pointer}.ingredient-photo:has(img){cursor:zoom-in}
    @media(max-width:760px){.app{padding:18px 14px}.hero{padding:25px 24px;margin-bottom:14px}.hero h1{font-size:26px}.hero-art{font-size:64px}.section-menu{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 0 14px}.section-menu button{border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--paper);color:var(--ink);font-weight:700;cursor:pointer}.section-menu button.active{background:var(--green);border-color:var(--green);color:#fff}.grid{grid-template-columns:1fr}.grid #recipePanel{display:none}.grid.show-recipes #ingredientPanel{display:none}.grid.show-recipes #recipePanel{display:block}.recipes{grid-template-columns:1fr}.ingredients{grid-template-columns:1fr}.ingredient-actions{flex-direction:row;gap:6px}.ingredient-action{padding:4px}.top{margin-bottom:18px}.day{display:none}}
  </style>
</head>
<body>
<main class="app">
  <header class="top"><div class="brand">冰箱<span>小厨</span> 🥬</div><div class="day">今天，吃点新鲜的</div></header>
  <section class="hero"><div><h1>打开冰箱，发现一顿好饭</h1><p>拍张照或录入食材，立即获得适合你家的菜谱。</p></div><div class="hero-art" aria-hidden="true">🥕</div></section>
  <nav class="section-menu" aria-label="主要内容"><button type="button" class="active" data-view="ingredients">🥬 食材</button><button type="button" data-view="recipes">🍳 食谱</button></nav>
  <div class="grid" id="mainGrid">
    <aside class="panel" id="ingredientPanel"><h2>我的冰箱</h2><p class="hint">上传食材照片后会智能识别可见食材；识别结果可以手动确认或修改。</p>
      <label class="upload" for="photo"><span style="font-size:30px">📷</span><strong>拍照 / 上传冰箱照片</strong><small>支持 JPG、PNG、HEIC</small><input id="photo" type="file" accept="image/*"></label><img id="preview" class="preview" alt="已上传的冰箱照片预览"><div id="scanResult" class="scan-result" aria-live="polite"></div><div id="aiCandidates" class="ai-candidates" aria-live="polite"></div>
      <div class="row"><input id="ingredientInput" placeholder="例如：西红柿" aria-label="添加食材"><button class="btn" id="addBtn">添加</button></div>
      <div id="expiryAlert" class="expiry-alert" aria-live="polite"></div><div id="chips" class="ingredients" aria-live="polite"></div>
      <div class="subhead">快速添加常见食材</div><div class="category" id="quick"><button>鸡蛋</button><button>牛奶</button><button>土豆</button><button>青椒</button><button>面条</button><button>豆腐</button></div>
    </aside>
    <section class="panel" id="recipePanel"><div class="result-head"><div><h2>为你推荐</h2><p class="hint" style="margin:5px 0 0">优先使用现有食材，减少浪费</p></div><span class="count" id="count"></span></div><div class="recipe-filters" id="recipeFilters" aria-label="菜谱筛选"><button type="button" class="active" data-filter="all">全部</button><button type="button" data-filter="complete">食材齐全</button><button type="button" data-filter="quick">快手菜</button><button type="button" data-filter="diet">减脂</button><button type="button" data-filter="filling">下饭</button><button type="button" data-filter="soup">汤</button><button type="button" data-filter="breakfast">早餐</button><button type="button" data-filter="urgent">优先消耗</button><button type="button" data-filter="favorite">已收藏</button></div><div id="recipes" class="recipes"></div><div id="detail" class="detail" aria-live="polite"></div></section>
  </div>
</main>
<dialog class="edit-dialog" id="editDialog" aria-labelledby="editDialogTitle">
  <form class="edit-form" id="editForm">
    <div class="edit-title"><h3 id="editDialogTitle">编辑食材</h3><button type="button" class="dialog-close" id="closeEdit" aria-label="关闭">×</button></div>
    <label class="edit-field">数量<input id="editQty" required placeholder="例如：4 个"></label>
    <label class="edit-field">已存放天数<input id="editDays" type="number" min="0" step="1" required></label>
    <label class="edit-field">保质期（天）<input id="editLife" type="number" min="1" step="1" required></label>
    <div class="edit-actions"><button type="button" class="btn alt" id="cancelEdit">取消</button><button type="submit" class="btn">保存</button></div>
  </form>
</dialog>
<dialog class="image-dialog" id="imageDialog"><img id="largeImage" alt="食材照片大图"><button type="button" id="closeImage">关闭</button></dialog>
<script>
const data=[
 {name:'番茄炒蛋',icon:'🍅',time:'10 分钟',need:['西红柿','鸡蛋'],optional:['葱'],steps:['准备（2 分钟）：西红柿切块；鸡蛋加少许盐和 1 勺清水打散。','翻炒鸡蛋（1 分钟）：锅烧热后加油，倒入蛋液，中火快速翻炒至刚凝固，盛出。','煸炒西红柿（4 分钟）：原锅补少许油，下西红柿中火翻炒 3–4 分钟，炒至软烂出汁。','合炒收汁（2 分钟）：倒回鸡蛋，加盐和少许糖，大火翻炒 1 分钟；汤汁略收后关火。']},
 {name:'青椒土豆丝',icon:'🥔',time:'15 分钟',need:['土豆','青椒'],optional:['蒜'],steps:['准备（5 分钟）：土豆切细丝，用清水冲洗 2 次去淀粉；青椒切丝，蒜切末。','爆香（30 秒）：热锅热油，放蒜末小火炒出香味，避免焦糊。','大火翻炒（3 分钟）：转大火，下土豆丝持续翻炒约 2 分钟，沿锅边淋 1 勺醋。','炒熟调味（2 分钟）：加入青椒丝、盐和少许清水，继续大火翻炒 1–2 分钟，断生即出锅。']},
 {name:'鸡蛋焖面',icon:'🍜',time:'18 分钟',need:['面条','鸡蛋','西红柿'],optional:['葱','蒜'],steps:['准备（3 分钟）：鸡蛋打散，西红柿切块；面条按长度掰开备用。','翻炒（4 分钟）：先将鸡蛋中火炒 1 分钟盛出；西红柿加少许油翻炒 3 分钟至出汁。','焖煮面条（8 分钟）：加入热水没过食材，加盐调味；放面条，盖盖中小火焖 6–8 分钟，中途翻动一次。','收汁（2 分钟）：放回鸡蛋，开盖大火翻拌 1–2 分钟，让汤汁均匀裹住面条。']},
 {name:'家常麻婆豆腐',icon:'🌶️',time:'12 分钟',need:['豆腐'],optional:['葱','蒜'],steps:['汆烫豆腐（2 分钟）：豆腐切 2 厘米小块，放入加盐的沸水中小火汆烫，捞出沥水。','炒香底料（1 分钟）：热锅下油，葱蒜小火煸香，再加入调味料炒出红油。','水煮入味（5 分钟）：加半碗水煮开，轻轻放入豆腐；保持小火微沸，勿用铲子大力翻动。','勾芡收汁（2 分钟）：分两次淋入薄芡，每次轻推锅身；汤汁浓稠后撒葱花出锅。']},
 {name:'奶香土豆泥',icon:'🥛',time:'20 分钟',need:['土豆','牛奶'],optional:['黄油'],steps:['蒸煮土豆（15 分钟）：土豆去皮切块，冷水上锅；水开后中火蒸 12–15 分钟，筷子能轻松穿透即可。','压泥（2 分钟）：趁热将土豆压成细泥，颗粒越少口感越顺滑。','搅拌调味（3 分钟）：牛奶加热至微温，分 2 次倒入土豆泥；每次搅拌 1 分钟，加入盐和黄油拌匀。']},
 {name:'清爽豆腐汤',icon:'🥣',time:'12 分钟',need:['豆腐'],optional:['葱','蒜'],steps:['准备（2 分钟）：豆腐切小块，葱切葱花，蒜切末。','煮汤底（3 分钟）：锅中加入两碗清水和蒜末，大火煮开。','煮豆腐（5 分钟）：轻轻放入豆腐，转中小火保持微沸，加入盐和白胡椒调味。','收尾（2 分钟）：撒入葱花，关火焖 1 分钟即可。']}
];
const recipeTags={'番茄炒蛋':['快手菜','下饭','早餐'],'青椒土豆丝':['快手菜','下饭'],'鸡蛋焖面':['下饭','早餐'],'家常麻婆豆腐':['快手菜','下饭'],'奶香土豆泥':['早餐'],'清爽豆腐汤':['快手菜','减脂','汤']};
function addRecipe(name,icon,time,need,optional,tags,method){const items=need.join('、');const steps={炒:[`准备（3 分钟）：将${items}洗净切好；调味料提前备在手边。`,`热锅（1 分钟）：锅烧热后倒少许油，先下较耐炒的食材。`,`翻炒（${time.replace(' 分钟','').replace(/\D/g,'')-5||5} 分钟）：保持中大火不断翻炒，食材断生后按口味加盐、生抽调味。`,`收尾（1 分钟）：撒入葱花或蒜末，翻匀即可出锅。`],煮:[`准备（3 分钟）：将${items}洗净切好，按大小分开放置。`,`煮开（2 分钟）：锅中加水或高汤，大火煮开后先放较难熟的食材。`,`小火煮熟（${time.replace(' 分钟','').replace(/\D/g,'')-5||5} 分钟）：转中小火，保持微沸，熟后加盐和白胡椒调味。`,`收尾（1 分钟）：关火前加入易熟食材，稍焖后盛出。`],蒸:[`准备（3 分钟）：将${items}处理好，平码进耐热盘或碗中。`,`调味（1 分钟）：加少量盐、生抽或清水，盖上盘子防止水汽滴入。`,`蒸制（${time.replace(' 分钟','').replace(/\D/g,'')-4||8} 分钟）：水开后放入蒸锅，中火蒸至熟透。`,`收尾（1 分钟）：取出后按口味淋少许热油或撒葱花。`],拌:[`准备（4 分钟）：将${items}洗净、切丝或切块；需要焯水的食材先焯熟放凉。`,`调汁（1 分钟）：用生抽、醋和少许香油调成料汁。`,`拌匀（2 分钟）：将食材和料汁充分拌匀，静置片刻更入味。`,`装盘（1 分钟）：尝味后补盐，装盘即可食用。`]}[method]||[];data.push({name,icon,time,need,optional,steps});recipeTags[name]=tags}
addRecipe('葱花煎蛋','🍳','8 分钟',['鸡蛋'],['葱'],['快手菜','早餐'],'炒');
addRecipe('水煮蛋','🥚','10 分钟',['鸡蛋'],[],['减脂','早餐'],'煮');
addRecipe('嫩滑鸡蛋羹','🥚','12 分钟',['鸡蛋'],['葱'],['减脂','早餐'],'蒸');
addRecipe('紫菜蛋花汤','🥣','10 分钟',['鸡蛋','紫菜'],['葱'],['快手菜','减脂','汤'],'煮');
addRecipe('西红柿鸡蛋汤','🥣','12 分钟',['西红柿','鸡蛋'],['葱'],['快手菜','减脂','汤'],'煮');
addRecipe('西红柿拌豆腐','🥗','8 分钟',['西红柿','豆腐'],[],['快手菜','减脂'],'拌');
addRecipe('青椒炒蛋','🫑','10 分钟',['青椒','鸡蛋'],[],['快手菜','下饭'],'炒');
addRecipe('青椒肉丝','🥩','15 分钟',['青椒','猪肉'],['蒜'],['下饭'],'炒');
addRecipe('鸡肉炒青椒','🍗','15 分钟',['鸡肉','青椒'],['蒜'],['减脂','下饭'],'炒');
addRecipe('清炒时蔬','🥬','8 分钟',['青菜'],['蒜'],['快手菜','减脂'],'炒');
addRecipe('蒜蓉生菜','🥬','8 分钟',['生菜'],['蒜'],['快手菜','减脂'],'炒');
addRecipe('醋溜白菜','🥬','10 分钟',['白菜'],['蒜'],['快手菜','下饭'],'炒');

const initialIngredients=[{name:'鸡蛋',icon:'🥚',qty:'4 个',days:2},{name:'西红柿',icon:'🍅',qty:'2 个',days:6},{name:'青椒',icon:'🫑',qty:'1 个',days:5},{name:'土豆',icon:'🥔',qty:'3 个',days:8}];
let ingredients=(()=>{try{const saved=JSON.parse(localStorage.getItem('fridgeChefIngredients'));return Array.isArray(saved)?saved.map(x=>({...x,qty:x.qty||'1 份',days:Number.isFinite(x.days)?x.days:0})):initialIngredients}catch{return initialIngredients}})(); const chips=document.querySelector('#chips'),list=document.querySelector('#recipes'),detail=document.querySelector('#detail');
let favorites=(()=>{try{const saved=JSON.parse(localStorage.getItem('fridgeChefFavorites'));return Array.isArray(saved)?saved:[]}catch{return []}})();
let pendingPhoto='',pendingRecognitionPhoto='';
const iconFor={鸡蛋:'🥚',西红柿:'🍅',青椒:'🫑',土豆:'🥔',面条:'🍜',牛奶:'🥛',豆腐:'🧈',葱:'🧅',蒜:'🧄'};
const shelfLife={鸡蛋:21,西红柿:7,青椒:7,土豆:14,牛奶:5,豆腐:3,面条:30,葱:7,蒜:21};
function remaining(x){return (Number.isFinite(x.life)?x.life:(shelfLife[x.name]||7))-x.days}
function saveIngredients(){localStorage.setItem('fridgeChefIngredients',JSON.stringify(ingredients))}
function saveFavorites(){localStorage.setItem('fridgeChefFavorites',JSON.stringify(favorites))}
window.addEventListener('pagehide',saveIngredients);
window.addEventListener('pagehide',saveFavorites);
function render(){const urgent=ingredients.filter(x=>remaining(x)<=2);const alert=document.querySelector('#expiryAlert');alert.style.display=urgent.length?'block':'none';alert.textContent=urgent.length?`⏰ 优先吃掉：${urgent.map(x=>`${x.name}（约剩 ${Math.max(0,remaining(x))} 天）`).join('、')}`:'';chips.innerHTML=ingredients.map((x,i)=>{const left=remaining(x),urgentClass=left<=2?' urgent':'';const visual=x.photo?`<img src="${x.photo}" alt="${x.name}">`:x.icon;return `<div class="ingredient${urgentClass}"><span class="ingredient-photo" aria-hidden="true">${visual}</span><span class="ingredient-info"><span class="ingredient-name">${x.name}</span><span class="ingredient-days">${x.qty} · 已存放 <b>${x.days}</b> 天</span></span><span class="ingredient-actions"><button type="button" class="ingredient-action edit-ingredient" data-i="${i}" aria-label="编辑${x.name}">编辑</button><button type="button" class="ingredient-action remove-ingredient" data-i="${i}" aria-label="删除${x.name}">删除</button></span></div>`}).join('')||'<span class="hint">还没有食材，先添加一些吧。</span>';chips.querySelectorAll('.remove-ingredient').forEach(b=>b.onclick=()=>{ingredients.splice(+b.dataset.i,1);render()});chips.querySelectorAll('.edit-ingredient').forEach(b=>b.onclick=()=>editIngredient(+b.dataset.i));
 const names=ingredients.map(x=>x.name);const ranked=data.map(r=>({...r,have:r.need.filter(x=>names.includes(x)),missing:r.need.filter(x=>!names.includes(x)),urgency:r.need.reduce((sum,n)=>sum+(ingredients.find(x=>x.name===n)&&remaining(ingredients.find(x=>x.name===n))<=2?1:0),0)})).sort((a,b)=>b.urgency-a.urgency||b.have.length/a.need.length-a.have.length/a.need.length);document.querySelector('#count').textContent=`${ranked.length} 道可选菜谱`;list.innerHTML=ranked.map((r,i)=>{let pct=Math.round(r.have.length/r.need.length*100);return `<article class="recipe" data-i="${i}"><div class="recipe-top"><span class="emoji">${r.icon}</span><span class="tag">${r.urgency?'优先消耗 · ':''}${r.time}</span></div><h3>${r.name}</h3><p>${r.missing.length?`还差：${r.missing.join('、')}`:'食材齐全，可以开做！'}</p><div class="bar"><span style="width:${pct}%"></span></div><span class="match">食材匹配 ${pct}%</span></article>`}).join('');list.querySelectorAll('.recipe').forEach(c=>c.onclick=()=>show(ranked[+c.dataset.i],c));}
function show(r,card){list.querySelectorAll('.recipe').forEach(x=>x.classList.remove('active'));card.classList.add('active');detail.classList.add('show');const isFavorite=favorites.includes(r.name);detail.innerHTML=`<h3>${r.icon} ${r.name}</h3><div class="hint">已有：<strong>${r.have.join('、')||'—'}</strong>${r.missing.length?`　<span class="missing">需补：${r.missing.join('、')}</span>`:''}</div><strong>做法</strong><ul>${r.steps.map(s=>`<li>${s}</li>`).join('')}</ul><button type="button" class="btn alt" id="favoriteBtn">${isFavorite?'★ 已收藏':'☆ 收藏菜谱'}</button>${r.have.length?'<button type="button" class="btn" id="consumeBtn" style="margin-left:8px">做完了，消耗已有食材</button>':''}`;const favorite=document.querySelector('#favoriteBtn');favorite.onclick=()=>toggleFavorite(r,card);const consume=document.querySelector('#consumeBtn');if(consume)consume.onclick=()=>consumeRecipe(r)}
function toggleFavorite(recipe,card){favorites=favorites.includes(recipe.name)?favorites.filter(name=>name!==recipe.name):[...favorites,recipe.name];saveFavorites();show(recipe,card)}
function consumeRecipe(recipe){if(!confirm(`确认已做完「${recipe.name}」？将从冰箱中扣除已使用的食材。`))return;recipe.have.forEach(name=>{const item=ingredients.find(x=>x.name===name);if(!item)return;const match=String(item.qty).match(/^(\d+)(.*)$/);if(match&&Number(match[1])>1){item.qty=`${Number(match[1])-1}${match[2]}`}else{ingredients=ingredients.filter(x=>x!==item)}});saveIngredients();detail.classList.remove('show');render();alert('已更新冰箱库存')}
let editingIndex=null;const editDialog=document.querySelector('#editDialog'),editForm=document.querySelector('#editForm'),editQty=document.querySelector('#editQty'),editDays=document.querySelector('#editDays'),editLife=document.querySelector('#editLife');
function editIngredient(i){editingIndex=i;const item=ingredients[i];document.querySelector('#editDialogTitle').textContent=`编辑 ${item.name}`;editQty.value=item.qty;editDays.value=item.days;editLife.value=Number.isFinite(item.life)?item.life:(shelfLife[item.name]||7);if(typeof editDialog.showModal==='function'){editDialog.showModal()}else{const qty=prompt(`修改 ${item.name} 的数量`,item.qty);const days=prompt(`修改 ${item.name} 已存放天数`,item.days);if(qty!==null&&days!==null){item.qty=qty;item.days=Math.max(0,Number(days)||0);saveIngredients();render()}}}
editForm.onsubmit=e=>{e.preventDefault();const item=ingredients[editingIndex],days=Number(editDays.value),life=Number(editLife.value);if(!item||!editQty.value.trim()||!Number.isFinite(days)||days<0||!Number.isFinite(life)||life<1)return;item.qty=editQty.value.trim();item.days=Math.round(days);item.life=Math.round(life);saveIngredients();render();editDialog.close()};document.querySelector('#closeEdit').onclick=()=>editDialog.close();document.querySelector('#cancelEdit').onclick=()=>editDialog.close();
const recognizeUrl='https://env-d9cqc46m1hkv9k9nusag-cn-beijing.alicloudapi.com/recognize';
function resetPhotoState(){pendingPhoto='';pendingRecognitionPhoto='';document.querySelector('#preview').style.display='none';document.querySelector('#scanResult').style.display='none';const candidates=document.querySelector('#aiCandidates');candidates.style.display='none';candidates.innerHTML=''}
function add(v,keepPhoto=false){v=v.trim();if(v&&!ingredients.some(x=>x.name===v)){ingredients.push({name:v,icon:iconFor[v]||'🥗',photo:pendingPhoto,qty:'1 份',days:0});if(!keepPhoto)resetPhotoState();saveIngredients();render()}document.querySelector('#ingredientInput').value=''}
function showCandidates(items){const box=document.querySelector('#aiCandidates');box.innerHTML=`<p>识别到这些食材，请勾选确认（可取消勾选或直接手动输入）：</p><div class="candidate-list">${items.map((item,i)=>`<label class="candidate"><input type="checkbox" value="${item}" checked> ${item}</label>`).join('')}</div><div class="candidate-actions"><button type="button" class="btn" id="confirmCandidates">确认添加已选</button><button type="button" class="btn alt" id="manualInstead">我自己输入</button></div>`;box.style.display='block';document.querySelector('#confirmCandidates').onclick=()=>{const selected=[...box.querySelectorAll('input:checked')].map(input=>input.value);if(!selected.length){alert('请至少选择一种食材，或直接手动输入。');return}selected.forEach(name=>add(name,true));resetPhotoState();saveIngredients();render()};document.querySelector('#manualInstead').onclick=()=>{box.style.display='none';document.querySelector('#ingredientInput').focus()}}
document.querySelector('#addBtn').onclick=()=>add(document.querySelector('#ingredientInput').value);document.querySelector('#ingredientInput').onkeydown=e=>{if(e.key==='Enter')add(e.target.value)};document.querySelector('#quick').onclick=e=>{if(e.target.tagName==='BUTTON')add(e.target.textContent)};
function shrinkPhoto(file,max=180,quality=.78){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>{const image=new Image();image.onload=()=>{const scale=Math.min(1,max/Math.max(image.width,image.height)),canvas=document.createElement('canvas');canvas.width=Math.round(image.width*scale);canvas.height=Math.round(image.height*scale);canvas.getContext('2d').drawImage(image,0,0,canvas.width,canvas.height);resolve(canvas.toDataURL('image/jpeg',quality))};image.onerror=reject;image.src=reader.result};reader.onerror=reject;reader.readAsDataURL(file)})}
document.querySelector('#photo').onchange=async e=>{const file=e.target.files[0];if(!file)return;const scan=document.querySelector('#scanResult'),preview=document.querySelector('#preview');const candidates=document.querySelector('#aiCandidates');try{pendingPhoto=await shrinkPhoto(file,180,.78);pendingRecognitionPhoto=await shrinkPhoto(file,1280,.84);preview.src=pendingPhoto;preview.style.display='block';candidates.style.display='none';scan.style.display='block';scan.textContent='正在识别食材，请稍等…';const response=await fetch(recognizeUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:pendingRecognitionPhoto})});const result=await response.json();if(!response.ok)throw new Error(result.error||'识别服务暂时不可用');const items=Array.isArray(result.ingredients)?result.ingredients.filter(x=>typeof x==='string'&&x.trim()).map(x=>x.trim()).slice(0,20):[];if(items.length){scan.textContent='识别完成，请确认下方食材。你也可以忽略结果，手动输入名称。';showCandidates(items)}else{scan.textContent='没有识别到明确食材，请在下方手动输入名称后添加。'}}catch(error){scan.style.display='block';scan.textContent=`自动识别暂时不可用：${error.message||'请稍后重试'}。你仍可手动输入食材名称。`}};render();
document.querySelectorAll('.section-menu button').forEach(button=>button.onclick=()=>{const isRecipes=button.dataset.view==='recipes';document.querySelector('#mainGrid').classList.toggle('show-recipes',isRecipes);document.querySelectorAll('.section-menu button').forEach(x=>x.classList.toggle('active',x===button))});
function applyRecipeFilter(filter){const cards=[...list.querySelectorAll('.recipe')];cards.forEach(card=>{const text=card.textContent;const name=card.querySelector('h3').textContent;const tags=recipeTags[name]||[];const visible=filter==='all'||(filter==='complete'&&text.includes('食材齐全'))||(filter==='quick'&&tags.includes('快手菜'))||(filter==='diet'&&tags.includes('减脂'))||(filter==='filling'&&tags.includes('下饭'))||(filter==='soup'&&tags.includes('汤'))||(filter==='breakfast'&&tags.includes('早餐'))||(filter==='urgent'&&text.includes('优先消耗'))||(filter==='favorite'&&favorites.includes(name));card.style.display=visible?'':'none'});const visibleCount=cards.filter(card=>card.style.display!=='none').length;document.querySelector('#count').textContent=`${visibleCount} 道可选菜谱`;detail.classList.remove('show')}
document.querySelectorAll('#recipeFilters button').forEach(button=>button.onclick=()=>{document.querySelectorAll('#recipeFilters button').forEach(x=>x.classList.toggle('active',x===button));applyRecipeFilter(button.dataset.filter)});
function decorateRecipeTags(){list.querySelectorAll('.recipe').forEach(card=>{const name=card.querySelector('h3').textContent;const tags=recipeTags[name]||[];card.querySelector('.recipe-labels')?.remove();if(tags.length){const labels=document.createElement('div');labels.className='recipe-labels';labels.innerHTML=tags.map(tag=>`<span class="recipe-label">${tag}</span>`).join('');card.append(labels)}})}
new MutationObserver(()=>{decorateRecipeTags();const active=document.querySelector('#recipeFilters button.active');if(active)applyRecipeFilter(active.dataset.filter)}).observe(list,{childList:true});decorateRecipeTags();
function updateRemainingLabels(){chips.querySelectorAll('.ingredient-days').forEach((label,i)=>{const item=ingredients[i];if(item)label.innerHTML=`${item.qty} · 已存放 <b>${item.days}</b> 天 · 约剩 <b>${Math.max(0,remaining(item))}</b> 天`})}
const imageDialog=document.querySelector('#imageDialog'),largeImage=document.querySelector('#largeImage');
function updateIngredientPhotos(){chips.querySelectorAll('.ingredient-photo').forEach((slot,i)=>{const item=ingredients[i];slot.onclick=null;if(item&&item.photo){slot.innerHTML=`<img src="${item.photo}" alt="${item.name}照片">`;slot.onclick=()=>{largeImage.src=item.photo;largeImage.alt=`${item.name}照片大图`;imageDialog.showModal()}}})}
document.querySelector('#closeImage').onclick=()=>imageDialog.close();
new MutationObserver(()=>{updateRemainingLabels();updateIngredientPhotos()}).observe(chips,{childList:true});updateRemainingLabels();updateIngredientPhotos();
</script>
