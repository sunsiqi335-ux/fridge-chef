<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冰箱小厨 · 食材菜谱推荐</title>
  <style>
    :root{--ink:#20362f;--muted:#6a7972;--paper:#fffdf8;--cream:#f4f0e7;--green:#1f7453;--soft:#dcefe5;--line:#d9ddd5;--orange:#ec9a4a}
    *{box-sizing:border-box} body{margin:0;background:var(--cream);color:var(--ink);font-family:"Microsoft YaHei",system-ui,sans-serif} button,input{font:inherit}
    .app{max-width:1180px;margin:auto;padding:30px 22px 56px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.brand{font-size:23px;font-weight:800;letter-spacing:.5px}.brand span{color:var(--green)}.day{color:var(--muted);font-size:14px}
    .hero{background:linear-gradient(120deg,#225b46,#397c5c);color:white;border-radius:28px;padding:34px 38px;margin-bottom:26px;display:flex;align-items:center;justify-content:space-between;overflow:hidden}.hero h1{font-size:34px;margin:0 0 12px}.hero p{margin:0;opacity:.88}.hero-art{font-size:96px;transform:rotate(-8deg);filter:drop-shadow(12px 10px 0 rgba(0,0,0,.11))}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:26px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:24px}.panel h2{font-size:18px;margin:0 0 7px}.hint{font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.6}
    .upload{display:block;border:2px dashed #a7c5b5;border-radius:16px;background:#f7fcf8;padding:21px 12px;text-align:center;cursor:pointer;transition:.2s}.upload:hover{background:var(--soft)}.upload input{display:none}.upload strong{display:block;margin:8px 0 4px}.upload small{color:var(--muted)}.preview{display:none;width:100%;max-height:150px;object-fit:cover;border-radius:12px;margin-top:12px}.scan-result{display:none;margin-top:10px;padding:10px 12px;border-radius:10px;background:#edf7f0;color:var(--green);font-size:13px;line-height:1.5}
    .row{display:flex;gap:8px;margin:18px 0 12px}.row input{min-width:0;flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:white}.btn{border:0;border-radius:10px;padding:10px 14px;background:var(--green);color:white;font-weight:700;cursor:pointer}.btn:hover{filter:brightness(.93)}.btn.alt{background:#edf4ef;color:var(--green)}
    .expiry-alert{display:none;margin:14px 0 0;padding:10px 12px;border-radius:10px;background:#fff1df;color:#9a581a;font-size:13px;line-height:1.5}.ingredients{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;min-height:42px}.ingredient{display:flex;gap:9px;align-items:center;text-align:left;border:1px solid var(--line);border-radius:13px;padding:8px;background:#fff;cursor:pointer}.ingredient:hover{border-color:var(--green);background:#f7fcf8}.ingredient.urgent{border-color:#efbd85;background:#fffaf3}.ingredient-photo{display:grid;place-items:center;width:42px;height:42px;flex:0 0 42px;border-radius:10px;background:var(--soft);font-size:25px}.ingredient-info{min-width:0;flex:1}.ingredient-name{display:block;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ingredient-days{display:block;margin-top:3px;color:var(--muted);font-size:12px;white-space:nowrap}.ingredient-days b{color:var(--green)}.ingredient.urgent .ingredient-days b{color:#b26018}.remove{color:var(--muted);font-size:17px}.subhead{margin:22px 0 10px;font-size:14px;font-weight:700}.category{display:flex;gap:7px;flex-wrap:wrap}.category button{border:1px solid var(--line);background:white;border-radius:100px;padding:7px 10px;color:var(--muted);cursor:pointer}.category button:hover{border-color:var(--green);color:var(--green)}
    .result-head{display:flex;align-items:end;justify-content:space-between;margin-bottom:14px}.result-head h2{margin:0}.count{color:var(--green);font-size:14px;font-weight:700}.recipes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.recipe{border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;background:#fff;transition:.18s}.recipe:hover,.recipe.active{border-color:var(--green);box-shadow:0 7px 20px rgba(31,116,83,.11)}.recipe-top{display:flex;justify-content:space-between;align-items:center}.emoji{font-size:35px}.tag{font-size:12px;padding:4px 8px;border-radius:100px;background:#fff1df;color:#a75c17}.recipe h3{margin:13px 0 6px;font-size:17px}.recipe p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.bar{height:6px;background:#edf0ed;border-radius:6px;margin:13px 0 7px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green);border-radius:6px}.match{font-size:12px;color:var(--green);font-weight:700}
    .detail{display:none;margin-top:18px;border-top:1px solid var(--line);padding-top:18px}.detail.show{display:block}.detail h3{margin:0 0 9px}.detail ul{padding-left:18px;margin:8px 0;color:var(--muted);font-size:14px;line-height:1.8}.detail strong{color:var(--ink)}.missing{color:#b26018}.start{padding:46px 10px;text-align:center;color:var(--muted)}
    @media(max-width:760px){.app{padding:18px 14px}.hero{padding:25px 24px}.hero h1{font-size:26px}.hero-art{font-size:64px}.grid{grid-template-columns:1fr}.recipes{grid-template-columns:1fr}.top{margin-bottom:18px}.day{display:none}}
  </style>
</head>
<body>
<main class="app">
  <header class="top"><div class="brand">冰箱<span>小厨</span> 🥬</div><div class="day">今天，吃点新鲜的</div></header>
  <section class="hero"><div><h1>打开冰箱，发现一顿好饭</h1><p>拍张照或录入食材，立即获得适合你家的菜谱。</p></div><div class="hero-art" aria-hidden="true">🥕</div></section>
  <div class="grid">
    <aside class="panel"><h2>我的冰箱</h2><p class="hint">上传食材照片后会自动读取图片名称中的食材；也可以直接手动添加。</p>
      <label class="upload" for="photo"><span style="font-size:30px">📷</span><strong>拍照 / 上传冰箱照片</strong><small>支持 JPG、PNG、HEIC</small><input id="photo" type="file" accept="image/*" capture="environment"></label><img id="preview" class="preview" alt="已上传的冰箱照片预览"><div id="scanResult" class="scan-result" aria-live="polite"></div>
      <div class="row"><input id="ingredientInput" placeholder="例如：西红柿" aria-label="添加食材"><button class="btn" id="addBtn">添加</button></div>
      <div id="expiryAlert" class="expiry-alert" aria-live="polite"></div><div id="chips" class="ingredients" aria-live="polite"></div>
      <div class="subhead">快速添加常见食材</div><div class="category" id="quick"><button>鸡蛋</button><button>牛奶</button><button>土豆</button><button>青椒</button><button>面条</button><button>豆腐</button></div>
    </aside>
    <section class="panel"><div class="result-head"><div><h2>为你推荐</h2><p class="hint" style="margin:5px 0 0">优先使用现有食材，减少浪费</p></div><span class="count" id="count"></span></div><div id="recipes" class="recipes"></div><div id="detail" class="detail" aria-live="polite"></div></section>
  </div>
</main>
<script>
const data=[
 {name:'番茄炒蛋',icon:'🍅',time:'10 分钟',need:['西红柿','鸡蛋'],optional:['葱'],steps:['准备（2 分钟）：西红柿切块；鸡蛋加少许盐和 1 勺清水打散。','翻炒鸡蛋（1 分钟）：锅烧热后加油，倒入蛋液，中火快速翻炒至刚凝固，盛出。','煸炒西红柿（4 分钟）：原锅补少许油，下西红柿中火翻炒 3–4 分钟，炒至软烂出汁。','合炒收汁（2 分钟）：倒回鸡蛋，加盐和少许糖，大火翻炒 1 分钟；汤汁略收后关火。']},
 {name:'青椒土豆丝',icon:'🥔',time:'15 分钟',need:['土豆','青椒'],optional:['蒜'],steps:['准备（5 分钟）：土豆切细丝，用清水冲洗 2 次去淀粉；青椒切丝，蒜切末。','爆香（30 秒）：热锅热油，放蒜末小火炒出香味，避免焦糊。','大火翻炒（3 分钟）：转大火，下土豆丝持续翻炒约 2 分钟，沿锅边淋 1 勺醋。','炒熟调味（2 分钟）：加入青椒丝、盐和少许清水，继续大火翻炒 1–2 分钟，断生即出锅。']},
 {name:'鸡蛋焖面',icon:'🍜',time:'18 分钟',need:['面条','鸡蛋','西红柿'],optional:['葱','蒜'],steps:['准备（3 分钟）：鸡蛋打散，西红柿切块；面条按长度掰开备用。','翻炒（4 分钟）：先将鸡蛋中火炒 1 分钟盛出；西红柿加少许油翻炒 3 分钟至出汁。','焖煮面条（8 分钟）：加入热水没过食材，加盐调味；放面条，盖盖中小火焖 6–8 分钟，中途翻动一次。','收汁（2 分钟）：放回鸡蛋，开盖大火翻拌 1–2 分钟，让汤汁均匀裹住面条。']},
 {name:'家常麻婆豆腐',icon:'🌶️',time:'12 分钟',need:['豆腐'],optional:['葱','蒜'],steps:['汆烫豆腐（2 分钟）：豆腐切 2 厘米小块，放入加盐的沸水中小火汆烫，捞出沥水。','炒香底料（1 分钟）：热锅下油，葱蒜小火煸香，再加入调味料炒出红油。','水煮入味（5 分钟）：加半碗水煮开，轻轻放入豆腐；保持小火微沸，勿用铲子大力翻动。','勾芡收汁（2 分钟）：分两次淋入薄芡，每次轻推锅身；汤汁浓稠后撒葱花出锅。']},
 {name:'奶香土豆泥',icon:'🥛',time:'20 分钟',need:['土豆','牛奶'],optional:['黄油'],steps:['蒸煮土豆（15 分钟）：土豆去皮切块，冷水上锅；水开后中火蒸 12–15 分钟，筷子能轻松穿透即可。','压泥（2 分钟）：趁热将土豆压成细泥，颗粒越少口感越顺滑。','搅拌调味（3 分钟）：牛奶加热至微温，分 2 次倒入土豆泥；每次搅拌 1 分钟，加入盐和黄油拌匀。']}
];
let ingredients=[{name:'鸡蛋',icon:'🥚',days:2},{name:'西红柿',icon:'🍅',days:6},{name:'青椒',icon:'🫑',days:5},{name:'土豆',icon:'🥔',days:8}]; const chips=document.querySelector('#chips'),list=document.querySelector('#recipes'),detail=document.querySelector('#detail');
const iconFor={鸡蛋:'🥚',西红柿:'🍅',青椒:'🫑',土豆:'🥔',面条:'🍜',牛奶:'🥛',豆腐:'🧈',葱:'🧅',蒜:'🧄'};
const shelfLife={鸡蛋:21,西红柿:7,青椒:7,土豆:14,牛奶:5,豆腐:3,面条:30,葱:7,蒜:21};
function remaining(x){return (shelfLife[x.name]||7)-x.days}
function render(){const urgent=ingredients.filter(x=>remaining(x)<=2);const alert=document.querySelector('#expiryAlert');alert.style.display=urgent.length?'block':'none';alert.textContent=urgent.length?`⏰ 优先吃掉：${urgent.map(x=>`${x.name}（约剩 ${Math.max(0,remaining(x))} 天）`).join('、')}`:'';chips.innerHTML=ingredients.map((x,i)=>{const left=remaining(x),urgentClass=left<=2?' urgent':'';return `<button class="ingredient${urgentClass}" aria-label="删除${x.name}" data-i="${i}"><span class="ingredient-photo" aria-hidden="true">${x.icon}</span><span class="ingredient-info"><span class="ingredient-name">${x.name}</span><span class="ingredient-days">已存放 <b>${x.days}</b> 天</span></span><span class="remove" aria-hidden="true">×</span></button>`}).join('')||'<span class="hint">还没有食材，先添加一些吧。</span>';chips.querySelectorAll('button').forEach(b=>b.onclick=()=>{ingredients.splice(+b.dataset.i,1);render()});
 const names=ingredients.map(x=>x.name);const ranked=data.map(r=>({...r,have:r.need.filter(x=>names.includes(x)),missing:r.need.filter(x=>!names.includes(x)),urgency:r.need.reduce((sum,n)=>sum+(ingredients.find(x=>x.name===n)&&remaining(ingredients.find(x=>x.name===n))<=2?1:0),0)})).sort((a,b)=>b.urgency-a.urgency||b.have.length/a.need.length-a.have.length/a.need.length);document.querySelector('#count').textContent=`${ranked.length} 道可选菜谱`;list.innerHTML=ranked.map((r,i)=>{let pct=Math.round(r.have.length/r.need.length*100);return `<article class="recipe" data-i="${i}"><div class="recipe-top"><span class="emoji">${r.icon}</span><span class="tag">${r.urgency?'优先消耗 · ':''}${r.time}</span></div><h3>${r.name}</h3><p>${r.missing.length?`还差：${r.missing.join('、')}`:'食材齐全，可以开做！'}</p><div class="bar"><span style="width:${pct}%"></span></div><span class="match">食材匹配 ${pct}%</span></article>`}).join('');list.querySelectorAll('.recipe').forEach(c=>c.onclick=()=>show(ranked[+c.dataset.i],c));}
function show(r,card){list.querySelectorAll('.recipe').forEach(x=>x.classList.remove('active'));card.classList.add('active');detail.classList.add('show');detail.innerHTML=`<h3>${r.icon} ${r.name}</h3><div class="hint">已有：<strong>${r.have.join('、')||'—'}</strong>${r.missing.length?`　<span class="missing">需补：${r.missing.join('、')}</span>`:''}</div><strong>做法</strong><ul>${r.steps.map(s=>`<li>${s}</li>`).join('')}</ul>`}
function add(v){v=v.trim();if(v&&!ingredients.some(x=>x.name===v)){ingredients.push({name:v,icon:iconFor[v]||'🥗',days:0});render()}document.querySelector('#ingredientInput').value=''}
document.querySelector('#addBtn').onclick=()=>add(document.querySelector('#ingredientInput').value);document.querySelector('#ingredientInput').onkeydown=e=>{if(e.key==='Enter')add(e.target.value)};document.querySelector('#quick').onclick=e=>{if(e.target.tagName==='BUTTON')add(e.target.textContent)};
document.querySelector('#photo').onchange=e=>{const f=e.target.files[0];if(!f)return;const p=document.querySelector('#preview');p.src=URL.createObjectURL(f);p.style.display='block';const dictionary=['鸡蛋','西红柿','土豆','青椒','豆腐','牛奶','面条'];const found=dictionary.filter(x=>f.name.includes(x));found.forEach(add);const scan=document.querySelector('#scanResult');scan.style.display='block';scan.textContent=found.length?`识别完成：已从照片中添加 ${found.join('、')}。`:'照片已添加。请在下方手动确认或补充食材名称。';render()};render();
</script>
</body>
</html>
